name: Build, push, and deploy

# Workflow kjøres ved:
# - Pull requests (for å teste endringer før merge)
# - Push til master (deploy til prod)
# - Push til dev/** brancher (deploy til dev)
# - Manuell kjøring via GitHub UI (workflow_dispatch)
on:
  pull_request:
  push:
    branches:
      - master
      - 'dev/**'
  workflow_dispatch:

# Hindrer at flere builds kjører samtidig for samme branch
# Kansellerer tidligere kjøringer hvis en ny startes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Setter opp Java 11 (Temurin distribusjonen) med Gradle cache
      # Dette gjør at dependencies ikke lastes ned på nytt hver gang
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle

      # Bygger prosjektet og kjører alle tester
      # shadowJar lager en "fat JAR" med alle dependencies inkludert
      - name: Build and run tests
        run: ./gradlew --warning-mode all clean build shadowJar

      # Lagrer build-mappen (inkl. JAR-filen) som artifact
      # Dette gjør at build-steget kan bruke JAR-filen uten å bygge på nytt
      # Kjøres bare ved push til master eller dev/ehandelkanal-2 (ikke PR)
      - name: Upload build artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/
          retention-days: 1

  build:
    name: Build and push image (NAIS)
    needs: test
    if: github.event_name != 'pull_request' && (github.ref_name == 'master' || github.ref_name == 'dev/ehandelkanal-2')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.docker.outputs.image }}
      telemetry: ${{ steps.docker.outputs.telemetry }}
    steps:
      - uses: actions/checkout@v4

      # Laster ned JAR-filen som ble bygget i test-steget
      # Dette unngår å bygge prosjektet på nytt
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/

      # Logger inn mot GitHub Container Registry for å kunne hente privat base image
      # Base imaget (ghcr.io/navikt/ehandelkanal-2/java:11) ligger i deres eget repo
      # GITHUB_TOKEN er automatisk tilgjengelig i GitHub Actions og har read:packages rettigheter
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Bygger Docker image fra Dockerfile og pusher til NAIS sitt container registry
      # NAIS sitt registry er integrert med Kubernetes-clusteret og brukes ved deploy
      - name: Build & push (to NAIS registry)
        id: docker
        uses: nais/docker-build-push@v0
        with:
          team: team-oebs
          cache_from: type=gha  # Henter cached layers fra GitHub Actions cache for raskere bygg
          cache_to: type=gha,mode=max  # Lagrer alle layers til cache for fremtidige bygg

  deploy-dev:
    name: Deploy to NAIS dev
    needs: build
    if: github.ref_name == 'dev/ehandelkanal-2'  # Kjører bare ved push til dev/ehandelkanal-2 branchen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Nødvendig for NAIS deploy som bruker OIDC autentisering
    steps:
      - uses: actions/checkout@v4

      # Deployer til NAIS dev-fss cluster
      # Bruker naiserator.yaml som mal og config-dev.yaml for dev-spesifikke verdier
      # WORKLOAD_IMAGE er Docker imaget som ble bygget i build-steget
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-fss
          RESOURCE: .nais/naiserator.yaml
          VARS: .nais/config-dev.yaml
          WORKLOAD_IMAGE: ${{ needs.build.outputs.image }}
          TELEMETRY: ${{ needs.build.outputs.telemetry }}

  deploy-prod:
    name: Deploy to NAIS prod
    needs: build
    if: github.ref_name == 'master'  # Kjører bare ved push til master branchen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Nødvendig for NAIS deploy som bruker OIDC autentisering
    steps:
      - uses: actions/checkout@v4

      # Deployer til NAIS prod-fss cluster
      # Bruker naiserator.yaml som mal og config-prod.yaml for prod-spesifikke verdier
      # WORKLOAD_IMAGE er Docker imaget som ble bygget i build-steget
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-fss
          RESOURCE: .nais/naiserator.yaml
          VARS: .nais/config-prod.yaml
          WORKLOAD_IMAGE: ${{ needs.build.outputs.image }}
          TELEMETRY: ${{ needs.build.outputs.telemetry }}
