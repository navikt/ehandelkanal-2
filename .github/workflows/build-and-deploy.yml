name: Build, push, and deploy

on:
  pull_request:
  push:
    branches:
      - master
      - 'dev/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle
      - name: Build and run tests
        run: ./gradlew --warning-mode all clean build shadowJar
      # Kjøres bare ved push til master eller dev/ehandelkanal-2 (ikke PR)
      - name: Upload build artifacts
        #if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/
          retention-days: 1

  build:
    name: Build and push image (NAIS)
    needs: test
    #if: github.event_name != 'pull_request' && (github.ref_name == 'master' || github.ref_name == 'dev/ehandelkanal-2')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: read
    outputs:
      image: ${{ steps.docker.outputs.image }}
      telemetry: ${{ steps.docker.outputs.telemetry }}
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (to NAIS registry)
        id: docker
        uses: nais/docker-build-push@v0
        with:
          team: team-oebs
          platform: linux/amd64  # Bygger eksplisitt for AMD64 (NAIS kjører på AMD64, ikke ARM64)
          cache_from: type=gha
          cache_to: type=gha,mode=max

  deploy-dev:
    name: Deploy to NAIS dev
    needs: build
    #if: github.ref_name == 'dev/ehandelkanal-2'  # Kjører bare ved push til dev/ehandelkanal-2 branchen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-fss
          RESOURCE: .nais/naiserator.yaml
          VARS: .nais/config-dev.yaml
          WORKLOAD_IMAGE: ${{ needs.build.outputs.image }}
          TELEMETRY: ${{ needs.build.outputs.telemetry }}

  deploy-prod:
    name: Deploy to NAIS prod
    needs: build
    if: github.ref_name == 'master'  # Kjører bare ved push til master branchen
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: prod-fss
          RESOURCE: .nais/naiserator.yaml
          VARS: .nais/config-prod.yaml
          WORKLOAD_IMAGE: ${{ needs.build.outputs.image }}
          TELEMETRY: ${{ needs.build.outputs.telemetry }}
