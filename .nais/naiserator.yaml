apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: ehandelkanal-2
  namespace: team-oebs
  labels:
    team: team-oebs
spec:
  # image: {{ image }}
  env:
    - name: ENTRAID_TARGET_URL
      value: {{entraid_target_url}}
    - name: VEFASREST_MESSAGES_URL
      value: {{vefarest_message_url}}
    - name: VEFASREST_INBOX_URL
      value: {{vefarest_inbox_url}}
  replicas:
    min: 1
    max: 1
  port: 8080
  liveness:
    path: /internal/is_alive
    initialDelay: 5
    periodSeconds: 5
    failureThreshold: 30
  readiness:
    path: /internal/is_ready
    initialDelay: 5
    periodSeconds: 5
    failureThreshold: 30
  prometheus:
    enabled: true
    path: /internal/prometheus
  {{#if ingresses}}
  ingresses:
    {{#each ingresses}}
    - "{{this}}"
    {{/each}}
  {{/if}}
  vault:
    enabled: true
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 768Mi
  azure:
    application:
      enabled: true
  accessPolicy:
    outbound:
      rules:
        - application: sokos-vefasrest
          namespace: okonomi
